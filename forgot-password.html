<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - InvestTell</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="auth-page">
    <h2 data-i18n="forgotPassword">Reset Your Password</h2>
    <p data-i18n="forgotPasswordHint" style="text-align: center; color: #64748b; margin-bottom: 20px; font-size: 14px;">
      Enter your email and we'll send you a reset link.
    </p>

    <form onsubmit="event.preventDefault(); if (window.handleForgotPassword) { window.handleForgotPassword(event); } else { const t=document.getElementById('auth-toast'); if(t){ t.textContent='❌ Auth script did not load. Open this site via http (Live Server), not file://'; t.className='error'; t.style.display='block'; } else { alert('Auth script did not load. Open this site via http (Live Server), not file://'); } } return false;" id="forgot-form">
      <input 
        type="email" 
        id="reset-email" 
        placeholder="Enter your email" 
        required 
        autocomplete="email"
      >
      
      <button type="submit" data-i18n="sendResetLink">Send Reset Link</button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #0f172a;">
      <span data-i18n="rememberPassword">Remember your password?</span>
      <a href="login.html" data-i18n="backToSignIn" style="color: #22c55e; font-weight: 600; text-decoration: none;">Back to Sign In</a>
    </p>

    <div id="auth-toast"></div>
  </div>

  <footer>
    <p data-i18n="footerText">© 2026 InvestTell. All rights reserved</p>

    <div class="lang-icon">
      <button id="lang-btn" onclick="toggleLangMenu()">🌐 EN</button>
      <div id="lang-menu" class="lang-menu">
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('es')">Español</button>
        <button onclick="changeLanguage('fr')">Français</button>
        <button onclick="changeLanguage('de')">Deutsch</button>
        <button onclick="changeLanguage('pt')">Português</button>
      </div>
    </div>

    <div class="footer-links">
      <a href="index.html" data-i18n="home">Home</a>
      <a href="#" onclick="comingSoon(event)" data-i18n="aboutUs">About Us</a>
      <a href="#" onclick="comingSoon(event)" data-i18n="privacyPolicy">Privacy Policy</a>
      <a href="#" onclick="comingSoon(event)" data-i18n="contactUs">Contact Us</a>
    </div>
  </footer>

  <script src="script.js"></script>
  <script type="module" src="auth.js"></script>

</body>
</html>
